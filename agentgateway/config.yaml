config:
  modelCatalog:
  - file: /catalog.json
binds:
- port: 3000
  listeners:
  - routes:
    - backends:
      - ai:
          name: anthropic
          provider:
            anthropic: {}
      policies:
        ai:
          routes:
            "/v1/messages": "messages"
        backendAuth:
          key: "$ANTHROPIC_API_KEY"
