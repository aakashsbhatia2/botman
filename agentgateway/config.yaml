config:
  readinessAddr: 127.0.0.1:19001
  statsAddr: 127.0.0.1:19002
  modelCatalog:
  - file: /catalog.json

llm:
  port: 3000
  models:
  - name: anthropic/*
    provider: anthropic
    params:
      apiKey: $ANTHROPIC_API_KEY
    transformation:
      model: llmRequest.model.stripPrefix("anthropic/")
  - name: ollama/*
    provider: ollama
    params:
      baseUrl: $OLLAMA_BASE_URL
    transformation:
      model: llmRequest.model.stripPrefix("ollama/")

mcp:
  targets:
  - name: mcp-tools
    mcp:
      host: $MCP_TARGET_URL
