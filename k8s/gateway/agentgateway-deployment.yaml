apiVersion: apps/v1
kind: Deployment
metadata:
  name: agentgateway
  labels:
    app: agentgateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agentgateway
  template:
    metadata:
      labels:
        app: agentgateway
    spec:
      hostAliases:
        - ip: "192.168.65.2"
          hostnames:
            - "host.docker.internal"
      containers:
        - name: agentgateway
          image: botman-agentgateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
            - containerPort: 3001
          env:
            - name: OLLAMA_BASE_URL
              value: http://host.docker.internal:11434/v1
            - name: MCP_TARGET_URL
              value: http://mcp-tools:8080/mcp
          envFrom:
            - secretRef:
                name: botman-env
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
